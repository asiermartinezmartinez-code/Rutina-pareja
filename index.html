<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rutina Pareja</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surf:#141414;--s2:#1c1c1c;--s3:#222;--border:#282828;--text:#f5f2ee;--muted:#666;--him:#f0a500;--her:#f472b6;--green:#52d68a;--red:#f06060;--blue:#3ecfcf;--purple:#7b6cf6;--orange:#ff8c42}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;padding-bottom:60px}
.hero{padding:28px 20px 14px}
.hero-label{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.hero h1{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:800;line-height:0.9;text-transform:uppercase}
.hc{color:var(--him)}.sc{color:var(--her)}
.ptoggle{display:flex;gap:8px;padding:12px 16px}
.ptab{flex:1;padding:10px 8px;border-radius:12px;border:1.5px solid var(--border);text-align:center;cursor:pointer;transition:all 0.2s;color:var(--muted);background:var(--surf)}
.ptab-icon{font-size:20px;display:block;margin-bottom:2px}
.ptab-name{font-size:12px;font-weight:500}
.ptab.him.active{border-color:var(--him);background:rgba(240,165,0,0.1);color:var(--him)}
.ptab.her.active{border-color:var(--her);background:rgba(244,114,182,0.1);color:var(--her)}
.week-bar{display:flex;gap:6px;padding:0 16px 10px;overflow-x:auto;scrollbar-width:none}
.week-bar::-webkit-scrollbar{display:none}
.wbtn{flex-shrink:0;padding:7px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surf);color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s}
.wbtn.active{border-color:var(--him);background:rgba(240,165,0,0.1);color:var(--him)}
.day-bar{display:flex;gap:5px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none}
.day-bar::-webkit-scrollbar{display:none}
.dbtn{flex-shrink:0;padding:6px 11px;border-radius:100px;border:1px solid var(--border);font-size:11px;font-weight:500;cursor:pointer;transition:all 0.2s;color:var(--muted);background:var(--surf)}
.dbtn.active{color:#0a0a0a;border-color:transparent}
.dbtn[data-d="lunes"].active,.dbtn[data-d="viernes"].active{background:var(--blue)}
.dbtn[data-d="martes"].active,.dbtn[data-d="jueves"].active{background:var(--him)}
.dbtn[data-d="miercoles"].active{background:var(--purple)}
.dbtn[data-d="sabado"].active{background:var(--red)}
.dbtn[data-d="domingo"].active{background:var(--orange)}
.pgwrap{padding:0 16px;margin-bottom:12px}
.pglabel{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px}
.pgbar{height:3px;background:var(--border);border-radius:3px;overflow:hidden}
.pgfill{height:100%;border-radius:3px;transition:width 0.4s;width:0%;background:var(--him)}
.pgfill.her{background:var(--her)}
.content{padding:0 16px}
.sv-him .her-only{display:none!important}
.sv-her .him-only{display:none!important}
.ldg{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.ldg-sp{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--him);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.dhead{display:flex;align-items:center;gap:12px;margin-bottom:11px;padding:13px 16px;background:var(--surf);border-radius:13px;border:1px solid var(--border);position:relative;overflow:hidden}
.dhead::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:13px 13px 0 0}
.dhead.sup::after{background:var(--blue)}
.dhead.inf::after{background:var(--him)}
.dhead.swim::after{background:var(--purple)}
.dhead.free::after{background:var(--orange)}
.dhead-icon{font-size:24px;line-height:1}
.dhead-title{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;text-transform:uppercase;line-height:1;margin-bottom:2px}
.dhead-sub{font-size:11px;color:var(--muted)}
.block{background:var(--surf);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.bhd{padding:11px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.bdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dw{background:var(--red)}.da{background:var(--him)}.db{background:var(--red)}.dr{background:var(--green)}
.btitle{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;flex:1}
.bbadge{font-size:10px;padding:2px 7px;border-radius:100px;font-weight:500;flex-shrink:0}
.bst{background:rgba(240,165,0,0.15);color:var(--him)}
.bam{background:rgba(240,96,96,0.15);color:var(--red)}
.bem{background:rgba(62,207,207,0.15);color:var(--blue)}
.bta{background:rgba(240,96,96,0.15);color:var(--red)}
.bw{background:rgba(240,96,96,0.12);color:var(--red)}
.br{background:rgba(82,214,138,0.15);color:var(--green)}
.cv{color:var(--muted);font-size:12px;transition:transform 0.25s;flex-shrink:0}
.block.open .cv{transform:rotate(180deg)}
.bbody{display:none;padding:11px 14px}
.block.open .bbody{display:block}
.etog{padding:3px 8px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;font-family:'Barlow',sans-serif;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.etog.on{border-color:var(--him);color:var(--him);background:rgba(240,165,0,0.08)}
.del-block-btn{padding:3px 8px;border-radius:100px;border:1px solid transparent;background:transparent;color:transparent;font-size:10px;font-family:'Barlow',sans-serif;cursor:pointer;transition:all 0.3s;flex-shrink:0;margin-left:auto}
.block:hover .del-block-btn{color:rgba(240,96,96,0.4);border-color:rgba(240,96,96,0.2)}
.del-block-btn:hover{color:var(--red)!important;border-color:var(--red)!important;background:rgba(240,96,96,0.08)!important}
.exrow{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border);transition:opacity 0.2s}
.exrow:last-child{border-bottom:none;padding-bottom:0}
.exrow:first-child{padding-top:0}
.exrow.done{opacity:0.35}
.exchk{width:21px;height:21px;border-radius:6px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all 0.2s;cursor:pointer}
.sv-him .exrow.done .exchk{background:var(--him);border-color:var(--him);color:#0a0a0a}
.sv-her .exrow.done .exchk{background:var(--her);border-color:var(--her);color:#0a0a0a}
.excnt{flex:1;min-width:0;cursor:pointer}
.exname{font-size:13px;line-height:1.3}
.exdet{font-size:11px;color:var(--muted)}
.exacts{display:none;gap:4px;flex-shrink:0}
.edit-active .exacts{display:flex!important}
.ebtn{width:23px;height:23px;border-radius:6px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all 0.2s}
.eedit{background:rgba(240,165,0,0.1);color:var(--him)}
.edel{background:rgba(240,96,96,0.1);color:var(--red)}
.elog{background:rgba(82,214,138,0.1);color:var(--green);width:23px;height:23px;border-radius:6px;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.addexbtn{width:100%;padding:7px;background:transparent;border:1px dashed var(--border);border-radius:8px;color:var(--muted);font-family:'Barlow',sans-serif;font-size:11px;cursor:pointer;transition:all 0.2s;margin-top:7px;display:none}
.addexbtn:hover{border-color:var(--him);color:var(--him)}
.edit-active .addexbtn{display:block!important}
.info{background:var(--s2);border-radius:9px;padding:9px 11px;margin-bottom:9px;font-size:12px;color:var(--muted);line-height:1.5}
.info strong{color:var(--text)}
.ihim{border-left:2px solid var(--him);background:rgba(240,165,0,0.04)}
.iher{border-left:2px solid var(--her);background:rgba(244,114,182,0.04)}
.meta{margin-top:8px;padding:8px 11px;border-left:2px solid var(--him);background:rgba(240,165,0,0.05);border-radius:0 8px 8px 0;font-size:11px;color:var(--muted)}
.meta strong{color:var(--him)}
.srpanel{background:var(--s2);border-radius:11px;padding:11px;margin-top:9px;border:1px solid var(--border)}
.srpanel-title{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
.srrow{display:flex;gap:7px;align-items:center;margin-bottom:7px}
.srnum{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--muted);width:18px;text-align:center;flex-shrink:0}
.srinput{flex:1;background:var(--s3);border:1px solid var(--border);border-radius:7px;padding:6px 8px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s}
.srinput:focus{border-color:var(--him)}
.srinput.hf:focus{border-color:var(--her)}
.srunit{font-size:11px;color:var(--muted);flex-shrink:0}
.addsrbtn{width:100%;padding:6px;background:transparent;border:1px dashed var(--border);border-radius:7px;color:var(--muted);font-family:'Barlow',sans-serif;font-size:11px;cursor:pointer;margin-top:3px}
.addsrbtn:hover{border-color:var(--green);color:var(--green)}
.savesrbtn{width:100%;padding:8px;border:none;border-radius:8px;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;cursor:pointer;margin-top:7px;background:var(--him);color:#0a0a0a}
.savesrbtn.her{background:var(--her)}
.srhistory{margin-top:9px}

.shrval{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--him)}

.amtitle{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.amrow{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.amrow label{font-size:12px;color:var(--muted);flex:1}
.amrow input{width:50px;background:var(--border);border:none;border-radius:6px;padding:5px 7px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-align:center;outline:none}
.savam{padding:6px 10px;background:var(--him);color:#0a0a0a;border:none;border-radius:7px;font-family:'Barlow',sans-serif;font-size:11px;font-weight:600;cursor:pointer}
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.moverlay.open{display:flex}
.modal{background:#1a1a1a;border-radius:20px 20px 0 0;padding:22px 18px 38px;width:100%;max-width:500px;border:1px solid var(--border);border-bottom:none;animation:sup 0.3s ease;max-height:90vh;overflow-y:auto}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mtitle{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;text-transform:uppercase;margin-bottom:16px}
.mfield{margin-bottom:11px}
.mfield label{display:block;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.mfield input,.mfield select{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;outline:none}
.mfield input:focus{border-color:var(--him)}
.mfield select option{background:var(--s2)}
.mbtns{display:flex;gap:7px;margin-top:16px}
.msave{flex:1;padding:12px;background:var(--him);color:#0a0a0a;border:none;border-radius:11px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.mcancel{padding:12px 16px;background:var(--s2);color:var(--muted);border:1px solid var(--border);border-radius:11px;font-family:'Barlow',sans-serif;font-size:13px;cursor:pointer}
.sync{position:fixed;top:14px;right:14px;background:var(--green);color:#0a0a0a;font-size:10px;font-weight:600;padding:4px 10px;border-radius:100px;opacity:0;transition:opacity 0.3s;z-index:999;pointer-events:none}
.sync.on{opacity:1}
.empty-day{text-align:center;padding:36px 16px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-text{font-size:13px;margin-bottom:14px}
.empty-btn{padding:9px 18px;background:rgba(240,165,0,0.1);border:1px solid var(--him);border-radius:9px;color:var(--him);font-family:'Barlow',sans-serif;font-size:12px;cursor:pointer}
.rst{display:block;margin:12px 16px 0;width:calc(100% - 32px);padding:11px;background:transparent;border:1px solid var(--border);border-radius:9px;color:var(--muted);font-family:'Barlow',sans-serif;font-size:12px;cursor:pointer}
</style>
</head>

  </div>
</div>

// STATE
let player = 'him';
let weekIdx = 0;
let dayKey = 'lunes';
let semanaIds = [];
let modalMode = 'add';
let modalBloqueId = null;
let modalExId = null;

// ---- SUPABASE ----
async function sb(path, opts={}) {
  try {
    const r = await fetch(`${SB}/rest/v1/${path}`, {
      headers:{'apikey':SK,'Authorization':`Bearer ${SK}`,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},
      ...opts
    });
    if(!r.ok) return null;
    try{return await r.json();}catch{return null;}
  }catch{return null;}
}

function showSync() {
  const el=document.getElementById('sync');
  el.classList.add('on');
  setTimeout(()=>el.classList.remove('on'),2000);
}

// ---- INIT ----
async function init() {
  renderWeekBar();
  renderDayBar();
  await ensureWeeks();
  await loadDay();
}

async function ensureWeeks() {
  const data = await sb('semanas?order=numero.asc&select=*');
  if(data && data.length >= 4) {
    semanaIds = data.slice(0,4).map(w=>w.id);
    // Update names
    for(let i=0;i<4;i++) if(data[i]) WEEKS_DATA[i]._id = data[i].id;
    return;
  }
  // Need to create missing weeks
  const existing = data||[];
  for(let i=existing.length;i<4;i++) {
    const w = await sb('semanas',{method:'POST',body:JSON.stringify({numero:i+1,nombre:WEEKS_DATA[i].nombre})});
    if(w&&w[0]) existing.push(w[0]);
  }
  semanaIds = existing.map(w=>w.id);
  for(let i=0;i<4;i++) if(existing[i]) WEEKS_DATA[i]._id = existing[i].id;
}

async function loadDay() {
  const content = document.getElementById('mainContent');
  content.className = `content sv-${player}`;
  content.innerHTML = '<div class="ldg"><div class="ldg-sp"></div>Cargando...</div>';

  const semId = semanaIds[weekIdx];
  if(!semId) { content.innerHTML='<div class="ldg">Error de conexión</div>'; return; }

  // Get or create dia
  let dias = await sb(`dias?semana_id=eq.${semId}&dia=eq.${dayKey}&select=*`);
  if(!dias||dias.length===0) {
    dias = await createDayFromTemplate(semId, dayKey, weekIdx);
  }
  if(!dias||dias.length===0) { content.innerHTML='<div class="ldg">Error al cargar</div>'; return; }
  const dia = dias[0];

  // Get bloques
  let bloques = await sb(`bloques?dia_id=eq.${dia.id}&order=orden.asc&select=*`);
  if(!bloques||bloques.length===0) {
    await seedDayBlocks(dia.id, dayKey, weekIdx);
    bloques = await sb(`bloques?dia_id=eq.${dia.id}&order=orden.asc&select=*`);
  }
  if(!bloques||bloques.length===0) { content.innerHTML=renderEmpty(dia.id); return; }

  const bIds = bloques.map(b=>b.id);
  const exs = await sb(`ejercicios?bloque_id=in.(${bIds.join(',')})&order=orden.asc&select=*`)||[];

  const dayInfo = DAYS.find(d=>d.key===dayKey);
  let html = `<div class="dhead ${dayInfo.cls}">
    <div class="dhead-icon">${dayInfo.icon}</div>
    <div><div class="dhead-title">${dayInfo.title}</div><div class="dhead-sub">${dayInfo.sub}</div></div>
  </div>`;

  for(const b of bloques) {
    const bExs = exs.filter(e=>e.bloque_id===b.id);
    html += renderBlock(b, bExs);
  }
  html += `<button style="width:100%;padding:9px;background:transparent;border:1px dashed var(--border);border-radius:10px;color:var(--muted);font-family:'Barlow',sans-serif;font-size:11px;cursor:pointer;margin-bottom:10px" onclick="addBlock('${dia.id}')">+ Añadir bloque</button>`;

  content.innerHTML = html;
  updateProg();

  // Load amrap histories
  bloques.filter(b=>b.tipo==='amrap').forEach(b=>loadAmrapHist(b.id));
}

async function createDayFromTemplate(semId, day, wIdx) {
  const dayInfo = DAYS.find(d=>d.key===day);
  const r = await sb('dias',{method:'POST',body:JSON.stringify({semana_id:semId,dia:day,titulo:dayInfo.title,subtitulo:dayInfo.sub})});
  if(!r||!r[0]) return null;
  await seedDayBlocks(r[0].id, day, wIdx);
  return r;
}

async function seedDayBlocks(diaId, day, wIdx) {
  const wData = WEEKS_DATA[wIdx];
  const blocks = wData[day]||[];
  for(let bi=0;bi<blocks.length;bi++) {
    const b = blocks[bi];
    const br = await sb('bloques',{method:'POST',body:JSON.stringify({dia_id:diaId,titulo:b.titulo,tipo:b.tipo,badge:b.badge,orden:bi})});
    if(!br||!br[0]) continue;
    for(let ei=0;ei<b.exs.length;ei++) {
      const e=b.exs[ei];
      await sb('ejercicios',{method:'POST',body:JSON.stringify({bloque_id:br[0].id,player:e.p,nombre:e.n,detalle:e.d,orden:ei})});
    }
  }
}

function renderEmpty(diaId) {
  return `<div class="empty-day"><div class="empty-icon">📝</div><div class="empty-text">Día vacío</div><button class="empty-btn" onclick="seedAndReload()">+ Crear desde plantilla</button></div>`;
}

async function seedAndReload() {
  const semId = semanaIds[weekIdx];
  await createDayFromTemplate(semId, dayKey, weekIdx);
  await loadDay();
}

// ---- RENDER BLOCK ----
function getBadgeCls(tipo) {
  return {fuerza:'bst',amrap:'bam',emom:'bem',tabata:'bta',calentamiento:'bw',rec:'br'}[tipo]||'bst';
}
function getDotCls(tipo) {
  return {fuerza:'da',amrap:'db',emom:'db',tabata:'db',calentamiento:'dw',rec:'dr'}[tipo]||'da';
}

function renderBlock(b, exs) {
  const open = ['fuerza','calentamiento','rec'].includes(b.tipo);
  const isFuerza = b.tipo==='fuerza';
  const isAmrap = b.tipo==='amrap';

  const sharedExs = exs.filter(e=>e.player==='shared');
  const himExs = exs.filter(e=>e.player==='him');
  const herExs = exs.filter(e=>e.player==='her');

  let body = '';

  if(sharedExs.length>0||himExs.length===0&&herExs.length===0) {
    body += `<div class="shared">`;
    sharedExs.forEach(e=>{ body+=renderEx(e,isFuerza); });
    body += `<button class="addexbtn" onclick="openAdd('${b.id}','shared')">+ Añadir ejercicio</button></div>`;
  }
  if(himExs.length>0) {
    body += `<div class="him-only"><div class="info ihim">👨 <strong>Asier</strong></div>`;
    himExs.forEach(e=>{ body+=renderEx(e,isFuerza); });
    body += `<button class="addexbtn" onclick="openAdd('${b.id}','him')">+ Añadir ejercicio</button></div>`;
  }
  if(herExs.length>0) {
    body += `<div class="her-only"><div class="info iher">👩 <strong>Ella</strong></div>`;
    herExs.forEach(e=>{ body+=renderEx(e,isFuerza); });
    body += `<button class="addexbtn" onclick="openAdd('${b.id}','her')">+ Añadir ejercicio</button></div>`;
  }
  if(sharedExs.length===0&&himExs.length===0&&herExs.length===0) {
    body += `<div class="him-only"><button class="addexbtn" style="display:block" onclick="openAdd('${b.id}','him')">+ Añadir ejercicio</button></div>`;
    body += `<div class="her-only"><button class="addexbtn" style="display:block" onclick="openAdd('${b.id}','her')">+ Añadir ejercicio</button></div>`;
  }
  if(isAmrap) body += renderAmrap(b.id);

  return `<div class="block ${open?'open':''}" id="bl-${b.id}">
    <div class="bhd" onclick="tb(this)">
      <div class="bdot ${getDotCls(b.tipo)}"></div>
      <div class="btitle">${b.titulo}</div>
      <span class="bbadge ${getBadgeCls(b.tipo)}">${b.badge}</span>
      <button class="etog" onclick="toggleEdit(event,this,'${b.id}')">✏️ Editar</button>
      <button class="del-block-btn" onclick="delBlock(event,'${b.id}')" title="Eliminar bloque">🗑️</button>
      <span class="cv">▾</span>
    </div>
    <div class="bbody">${body}</div>
  </div>`;
}

function renderEx(e, showLog) {
  const n = (e.nombre||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
  const d = (e.detalle||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
  const logBtn = showLog ? `<button class="elog" onclick="openLog(event,'${e.id}','${n}')">📊</button>` : '';
  return `<div class="exrow" onclick="toggleDone(this)">
    <div class="exchk"></div>
    <div class="excnt">
      <div class="exname">${e.nombre}</div>
      ${e.detalle?`<div class="exdet">${e.detalle}</div>`:''}
    </div>
    ${logBtn}
    <div class="exacts">
      <button class="ebtn eedit" onclick="openEdit(event,'${e.id}','${n}','${d}')">✏️</button>
      <button class="ebtn edel" onclick="delEx(event,'${e.id}')">✕</button>
    </div>
  </div>`;
}

function renderAmrap(bId) {
  return `<div class="amblock">
    <div class="amtitle">🎯 Rondas AMRAP</div>
    <div class="amrow"><label>Esta semana</label><input type="number" min="0" max="20" placeholder="0" id="am-${bId}"><button class="savam" onclick="saveAmrap('${bId}')">Guardar</button></div>
    <div id="amh-${bId}"></div>
  </div>`;
}

// ---- SERIES LOG ----
async function openLog(e, exId, nombre) {
  e.stopPropagation();
  modalMode = 'log';
  modalExId = exId;
  document.getElementById('mtitle').textContent = nombre;
  document.getElementById('mf-name').style.display='none';
  document.getElementById('mf-det').style.display='none';
  document.getElementById('mf-player').style.display='none';
  document.getElementById('msavebtn').style.display='none';

  const semNum = weekIdx+1;
  const existing = await sb(`series_log?ejercicio_id=eq.${exId}&player=eq.${player}&semana_num=eq.${semNum}&order=numero_serie.asc&select=*`)||[];
  const series = existing.length>0 ? existing : [{numero_serie:1,kg:0,reps:0},{numero_serie:2,kg:0,reps:0},{numero_serie:3,kg:0,reps:0}];

  let html = `<div class="srpanel"><div class="srpanel-title">Series · ${player==='him'?'Asier':'Ella'} · Sem ${semNum}</div>`;
  series.forEach(s=>{
    html+=`<div class="srrow">
      <div class="srnum">${s.numero_serie}</div>
      <input type="number" class="srinput ${player==='her'?'hf':''}" placeholder="kg" value="${s.kg||''}" data-s="${s.numero_serie}" data-f="kg" step="0.5" min="0">
      <span class="srunit">kg</span>
      <input type="number" class="srinput ${player==='her'?'hf':''}" placeholder="reps" value="${s.reps||''}" data-s="${s.numero_serie}" data-f="reps" min="0">
      <span class="srunit">reps</span>
    </div>`;
  });
  html+=`<button class="addsrbtn" onclick="addSrRow(this)">+ Serie</button>`;
  html+=`<button class="savesrbtn ${player==='her'?'her':''}" onclick="saveSeries('${exId}',${semNum})">💾 Guardar series</button>`;

  const allHist = await sb(`series_log?ejercicio_id=eq.${exId}&player=eq.${player}&order=semana_num.desc,numero_serie.asc&select=*`)||[];
  if(allHist.length>0) {
    const bySem={};
    allHist.forEach(r=>{if(!bySem[r.semana_num])bySem[r.semana_num]=[];bySem[r.semana_num].push(r);});
    html+=`<div class="srhistory"><div class="srhtitle">Historial</div>`;
    Object.entries(bySem).sort((a,b)=>b[0]-a[0]).slice(0,4).forEach(([sem,rows])=>{
      const maxKg=Math.max(...rows.map(r=>r.kg||0));
      const tot=rows.reduce((s,r)=>s+(r.reps||0),0);
      html+=`<div class="shrrow"><span class="shrlbl">Sem ${sem} · ${rows.length} series</span><span class="shrval ${player==='her'?'her':''}">${maxKg}kg · ${tot} reps</span></div>`;
    });
    html+=`</div>`;
  }
  html+=`</div>`;

  document.getElementById('mseriesContent').innerHTML=html;
  openModal();
}

function addSrRow(btn) {
  const panel=btn.closest('.srpanel');
  const rows=panel.querySelectorAll('.srrow');
  const n=rows.length+1;
  const row=document.createElement('div');row.className='srrow';
  row.innerHTML=`<div class="srnum">${n}</div>
    <input type="number" class="srinput ${player==='her'?'hf':''}" placeholder="kg" data-s="${n}" data-f="kg" step="0.5" min="0">
    <span class="srunit">kg</span>
    <input type="number" class="srinput ${player==='her'?'hf':''}" placeholder="reps" data-s="${n}" data-f="reps" min="0">
    <span class="srunit">reps</span>`;
  btn.parentElement.insertBefore(row,btn);
}

async function saveSeries(exId, semNum) {
  const btn=document.querySelector('.savesrbtn');
  btn.textContent='...';
  await sb(`series_log?ejercicio_id=eq.${exId}&player=eq.${player}&semana_num=eq.${semNum}`,{method:'DELETE'});
  const rows=document.querySelectorAll('.srrow');
  for(const row of rows){
    const kg=parseFloat(row.querySelector('[data-f="kg"]').value)||0;
    const reps=parseInt(row.querySelector('[data-f="reps"]').value)||0;
    const serie=parseInt(row.querySelector('[data-f="kg"]').dataset.s);
    if(kg>0||reps>0) await sb('series_log',{method:'POST',body:JSON.stringify({ejercicio_id:exId,player,semana_num:semNum,numero_serie:serie,kg,reps})});
  }
  showSync();
  btn.textContent='✓ Guardado';
  setTimeout(()=>closeModal(),700);
}

// ---- AMRAP ----
async function saveAmrap(bId) {
  const input=document.getElementById(`am-${bId}`);
  const val=parseInt(input.value);
  if(isNaN(val)||val<0) return;
  const wk=`Sem ${weekIdx+1}`;
  const ex=await sb(`amrap_history?player=eq.${player}&day=eq.${dayKey}&week_label=eq.${encodeURIComponent(wk)}&select=id`);
  if(ex&&ex.length>0) await sb(`amrap_history?id=eq.${ex[0].id}`,{method:'PATCH',body:JSON.stringify({score:val})});
  else await sb('amrap_history',{method:'POST',body:JSON.stringify({player,day:dayKey,week_label:wk,score:val})});
  input.value='';
  showSync();
  loadAmrapHist(bId);
}

async function loadAmrapHist(bId) {
  const el=document.getElementById(`amh-${bId}`);
  if(!el) return;
  const data=await sb(`amrap_history?player=eq.${player}&day=eq.${dayKey}&order=created_at.desc&limit=4&select=week_label,score`)||[];
  if(!data.length){el.innerHTML='<div style="font-size:11px;color:var(--muted)">Sin registros</div>';return;}
  const best=Math.max(...data.map(h=>h.score));
  el.innerHTML=data.map((h,i)=>`<div class="shrrow"><span class="shrlbl">${h.week_label}</span><span class="shrval ${player==='her'?'her':''}">${h.score} rondas ${h.score===best?'🏆':''}</span></div>`).join('');
}

function openAdd(bId, pl) {

  document.getElementById('mtitle').textContent='Añadir ejercicio';

  document.getElementById('mf-det').style.display='block';
  document.getElementById('mf-player').style.display='block';
  document.getElementById('mplayer').value=pl;
  document.getElementById('mname').value='';
  document.getElementById('mdet').value='';
  document.getElementById('msavebtn').style.display='block';
  document.getElementById('msavebtn').onclick=saveAdd;
  document.getElementById('mseriesContent').innerHTML='';
  openModal();
}

async function saveAdd() {
  const n=document.getElementById('mname').value.trim();
  const d=document.getElementById('mdet').value.trim();
  const pl=document.getElementById('mplayer').value;
  if(!n) return;
  const exs=await sb(`ejercicios?bloque_id=eq.${modalBloqueId}&select=orden&order=orden.desc&limit=1`)||[];
  const ord=(exs[0]?exs[0].orden+1:0);
  await sb('ejercicios',{method:'POST',body:JSON.stringify({bloque_id:modalBloqueId,player:pl,nombre:n,detalle:d,orden:ord})});
  closeModal(); showSync(); await loadDay();
}

function openEdit(e, exId, nombre, detalle) {
  e.stopPropagation();
  modalMode='edit'; modalExId=exId;
  document.getElementById('mtitle').textContent='Editar ejercicio';
  document.getElementById('mf-name').style.display='block';
  document.getElementById('mf-det').style.display='block';
  document.getElementById('mf-player').style.display='none';
  document.getElementById('mname').value=nombre;
  document.getElementById('mdet').value=detalle;
  document.getElementById('msavebtn').style.display='block';
  document.getElementById('msavebtn').onclick=saveEdit;
  document.getElementById('mseriesContent').innerHTML='';
  openModal();
}

async function saveEdit() {
  const n=document.getElementById('mname').value.trim();
  const d=document.getElementById('mdet').value.trim();
  if(!n) return;
  await sb(`ejercicios?id=eq.${modalExId}`,{method:'PATCH',body:JSON.stringify({nombre:n,detalle:d})});
  closeModal(); showSync(); await loadDay();
}

async function delBlock(e, bId) {
  e.stopPropagation();
  if(!confirm('¿Eliminar este bloque y todos sus ejercicios?')) return;
  // Delete exercises first
  await sb(`ejercicios?bloque_id=eq.${bId}`,{method:'DELETE'});
  await sb(`bloques?id=eq.${bId}`,{method:'DELETE'});
  showSync(); await loadDay();
}

async function delEx(e, exId) {
  e.stopPropagation();
  if(!confirm('¿Eliminar este ejercicio?')) return;
  await sb(`ejercicios?id=eq.${exId}`,{method:'DELETE'});
  showSync(); await loadDay();
}

async function addBlock(diaId) {
  const titulo=prompt('Nombre del bloque:');
  if(!titulo) return;
  const tipo=prompt('Tipo (fuerza/amrap/emom/calentamiento/rec):','fuerza')||'fuerza';
  const badge=prompt('Badge (ej: 4×8 o 12 MIN):','')||'';
  await sb('bloques',{method:'POST',body:JSON.stringify({dia_id:diaId,titulo,tipo,badge,orden:99})});
  showSync(); await loadDay();
}

// ---- UI ----
function setP(p, tab) {
  player=p;
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('mainContent').className=`content sv-${p}`;
  document.getElementById('pgfill').classList.toggle('her',p==='her');
  document.getElementById('pname').textContent=p==='him'?'Asier':'Ella';
  updateProg();
  document.querySelectorAll('[id^="amh-"]').forEach(el=>{
    const bId=el.id.replace('amh-','');loadAmrapHist(bId);
  });
}

function renderWeekBar() {
  document.getElementById('weekBar').innerHTML = WEEKS_DATA.map((w,i)=>
    `<button class="wbtn ${i===weekIdx?'active':''}" onclick="selWeek(${i},this)">${w.nombre}</button>`
  ).join('');
}

async function selWeek(idx, btn) {
  weekIdx=idx;
  document.querySelectorAll('.wbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  await loadDay();
}

function renderDayBar() {
  document.getElementById('dayBar').innerHTML = DAYS.map(d=>
    `<button class="dbtn ${d.key===dayKey?'active':''}" data-d="${d.key}" onclick="selDay('${d.key}',this)">${d.label}</button>`
  ).join('');
}

async function selDay(d, btn) {
  dayKey=d;
  document.querySelectorAll('.dbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  await loadDay();
}

function tb(hd) { hd.parentElement.classList.toggle('open'); }

function toggleEdit(e, btn, bId) {
  e.stopPropagation();
  const block=document.getElementById(`bl-${bId}`);
  block.classList.toggle('edit-active');
  btn.classList.toggle('on');
  btn.textContent=block.classList.contains('edit-active')?'✓':'✏️';
  const on=block.classList.contains('edit-active');
  block.querySelectorAll('.exacts,.addexbtn').forEach(el=>el.style.display=on?'flex':'');
  block.querySelectorAll('.addexbtn').forEach(el=>el.style.display=on?'block':'');
}

function toggleDone(row) {
  if(row.tagName==='BUTTON'||row.classList.contains('ebtn')||row.classList.contains('elog')) return;
  row.classList.toggle('done');
  row.querySelector('.exchk').textContent=row.classList.contains('done')?'✓':'';
  updateProg();
}

function updateProg() {
  const c=document.getElementById('mainContent');
  const shared=[...c.querySelectorAll('.shared .exrow')];
  const pl=[...c.querySelectorAll(`.${player}-only .exrow`)];
  const all=shared.length+pl.length;
  const done=[...shared,...pl].filter(r=>r.classList.contains('done')).length;
  document.getElementById('ptext').textContent=`${done}/${all}`;
  document.getElementById('pgfill').style.width=all>0?(done/all*100)+'%':'0%';
}

function resetDay() {
  document.querySelectorAll('#mainContent .exrow').forEach(r=>{
    r.classList.remove('done');r.querySelector('.exchk').textContent='';
  });
  updateProg();
}

// ---- MODAL ----
function openModal(){document.getElementById('moverlay').classList.add('open');}
function closeModal(){
  document.getElementById('moverlay').classList.remove('open');
  document.getElementById('mf-name').style.display='block';
  document.getElementById('mf-det').style.display='block';
  document.getElementById('mf-player').style.display='block';
  document.getElementById('msavebtn').style.display='block';
  document.getElementById('mseriesContent').innerHTML='';
}
document.getElementById('moverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

init();
</script>
