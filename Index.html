<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rutina Pareja</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--surface:#141414;--s2:#1c1c1c;--s3:#222;
  --border:#282828;--text:#f5f2ee;--muted:#666;
  --him:#f0a500;--her:#f472b6;--green:#52d68a;--red:#f06060;
  --blue:#3ecfcf;--purple:#7b6cf6;--orange:#ff8c42;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;padding-bottom:60px}

/* HERO */
.hero{padding:32px 20px 18px;position:relative}
.hero::before{content:’’;position:fixed;top:-100px;right:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(244,114,182,0.07) 0%,transparent 65%);pointer-events:none}
.hero-label{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(–muted);margin-bottom:6px}
.hero h1{font-family:‘Barlow Condensed’,sans-serif;font-size:48px;font-weight:800;line-height:0.9;text-transform:uppercase}
.him-c{color:var(–him)}.her-c{color:var(–her)}

/* PLAYER */
.ptoggle{display:flex;gap:8px;padding:14px 20px}
.ptab{flex:1;padding:10px 8px;border-radius:12px;border:1.5px solid var(–border);text-align:center;cursor:pointer;transition:all 0.2s;color:var(–muted);background:var(–surface)}
.ptab-icon{font-size:20px;display:block;margin-bottom:2px}
.ptab-name{font-size:12px;font-weight:500}
.ptab.him.active{border-color:var(–him);background:rgba(240,165,0,0.1);color:var(–him)}
.ptab.her.active{border-color:var(–her);background:rgba(244,114,182,0.1);color:var(–her)}

/* WEEK SELECTOR */
.week-selector{padding:0 16px 16px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.week-selector::-webkit-scrollbar{display:none}
.week-btn{flex-shrink:0;padding:8px 14px;border-radius:10px;border:1px solid var(–border);background:var(–surface);color:var(–muted);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.week-btn.active{border-color:var(–him);background:rgba(240,165,0,0.1);color:var(–him)}
.add-week-btn{flex-shrink:0;padding:8px 14px;border-radius:10px;border:1px dashed var(–border);background:transparent;color:var(–muted);font-size:12px;cursor:pointer;transition:all 0.2s}
.add-week-btn:hover{border-color:var(–him);color:var(–him)}

/* DAY STRIP */
.day-strip{display:flex;gap:6px;padding:0 16px 16px;overflow-x:auto;scrollbar-width:none}
.day-strip::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;padding:7px 13px;border-radius:100px;border:1px solid var(–border);font-size:11px;font-weight:500;cursor:pointer;transition:all 0.2s;color:var(–muted);background:var(–surface)}
.day-btn.active{color:#0a0a0a;border-color:transparent;background:var(–him)}

/* PROGRESS */
.prog-wrap{padding:0 16px;margin-bottom:16px}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(–muted);margin-bottom:5px}
.prog-bar{height:3px;background:var(–border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width 0.4s;width:0%;background:var(–him)}
.prog-fill.her{background:var(–her)}

/* CONTENT */
.content{padding:0 16px}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(–muted);font-size:14px}
.loading-spinner{width:32px;height:32px;border:2px solid var(–border);border-top-color:var(–him);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* DAY HEADER */
.day-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;padding:16px 18px;background:var(–surface);border-radius:16px;border:1px solid var(–border);position:relative;overflow:hidden}
.day-header::after{content:’’;position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0;background:var(–him)}
.day-header-icon{font-size:28px;line-height:1}
.day-header-title{font-family:‘Barlow Condensed’,sans-serif;font-size:22px;font-weight:800;text-transform:uppercase;line-height:1;margin-bottom:3px}
.day-header-sub{font-size:12px;color:var(–muted);font-weight:300}
.day-header-edit{margin-left:auto;padding:5px 10px;border-radius:8px;border:1px solid var(–border);background:transparent;color:var(–muted);font-size:11px;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.day-header-edit.on{border-color:var(–him);color:var(–him);background:rgba(240,165,0,0.08)}

/* BLOCKS */
.block{background:var(–surface);border:1px solid var(–border);border-radius:14px;margin-bottom:12px;overflow:hidden}
.block-hd{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(–border);cursor:pointer;user-select:none}
.bdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-w{background:var(–red)}.dot-a{background:var(–him)}.dot-b{background:var(–red)}.dot-r{background:var(–green)}
.btitle{font-family:‘Barlow Condensed’,sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;flex:1}
.bbadge{font-size:10px;padding:2px 7px;border-radius:100px;font-weight:500;flex-shrink:0}
.b-str{background:rgba(240,165,0,0.15);color:var(–him)}
.b-amr{background:rgba(240,96,96,0.15);color:var(–red)}
.b-emo{background:rgba(62,207,207,0.15);color:var(–blue)}
.b-tab{background:rgba(240,96,96,0.15);color:var(–red)}
.b-wrm{background:rgba(240,96,96,0.12);color:var(–red)}
.b-rec{background:rgba(82,214,138,0.15);color:var(–green)}
.chev{color:var(–muted);font-size:12px;transition:transform 0.25s;flex-shrink:0}
.block.open .chev{transform:rotate(180deg)}
.block-body{display:none;padding:12px 16px}
.block.open .block-body{display:block}

/* EX ROWS */
.ex-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(–border);transition:opacity 0.2s}
.ex-row:last-child{border-bottom:none;padding-bottom:0}
.ex-row:first-child{padding-top:0}
.ex-row.done{opacity:0.35}
.ex-chk{width:22px;height:22px;border-radius:6px;border:1.5px solid var(–border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all 0.2s;cursor:pointer}
.sv-him .ex-row.done .ex-chk{background:var(–him);border-color:var(–him);color:#0a0a0a}
.sv-her .ex-row.done .ex-chk{background:var(–her);border-color:var(–her);color:#0a0a0a}
.ex-content{flex:1;min-width:0;cursor:pointer}
.ex-name-text{font-size:13px;font-weight:400;line-height:1.3}
.ex-det-text{font-size:11px;color:var(–muted);font-weight:300}
.ex-actions{display:none;gap:4px;flex-shrink:0}
.edit-active .ex-actions{display:flex}
.ex-edit-btn,.ex-del-btn{width:24px;height:24px;border-radius:6px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all 0.2s}
.ex-edit-btn{background:rgba(240,165,0,0.1);color:var(–him)}
.ex-del-btn{background:rgba(240,96,96,0.1);color:var(–red)}
.ex-log-btn{width:24px;height:24px;border-radius:6px;border:none;cursor:pointer;background:rgba(82,214,138,0.1);color:var(–green);font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ADD EX BTN */
.add-ex-btn{width:100%;padding:8px;background:transparent;border:1px dashed var(–border);border-radius:10px;color:var(–muted);font-family:‘Barlow’,sans-serif;font-size:12px;cursor:pointer;transition:all 0.2s;margin-top:8px;display:none}
.add-ex-btn:hover{border-color:var(–him);color:var(–him)}
.edit-active .add-ex-btn{display:block}

/* INFO BOXES */
.info{background:var(–s2);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(–muted);line-height:1.6}
.info strong{color:var(–text);font-weight:500}
.info-him{border-left:2px solid var(–him);background:rgba(240,165,0,0.04)}
.info-her{border-left:2px solid var(–her);background:rgba(244,114,182,0.04)}
.meta{margin-top:10px;padding:8px 12px;border-left:2px solid var(–him);background:rgba(240,165,0,0.05);border-radius:0 8px 8px 0;font-size:12px;color:var(–muted);line-height:1.5}
.meta strong{color:var(–him)}
.warn{background:rgba(240,165,0,0.08);border:1px solid rgba(240,165,0,0.25);border-radius:10px;padding:10px 14px;font-size:12px;color:var(–him);margin-bottom:12px}
.sec-title{font-size:12px;font-weight:600;margin:10px 0 6px;color:var(–text)}

/* SERIES LOG */
.series-panel{background:var(–s2);border-radius:12px;padding:12px;margin-top:10px;border:1px solid var(–border)}
.series-panel-title{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(–muted);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.series-panel-title span{color:var(–green);font-size:10px;cursor:pointer}
.series-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.series-num{font-family:‘Barlow Condensed’,sans-serif;font-size:18px;font-weight:700;color:var(–muted);width:24px;text-align:center;flex-shrink:0}
.series-input{flex:1;background:var(–s3);border:1px solid var(–border);border-radius:8px;padding:7px 10px;color:var(–text);font-family:‘Barlow’,sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;width:100%}
.series-input:focus{border-color:var(–him)}
.series-input.her-focus:focus{border-color:var(–her)}
.series-unit{font-size:11px;color:var(–muted);flex-shrink:0}
.add-serie-btn{width:100%;padding:7px;background:transparent;border:1px dashed var(–border);border-radius:8px;color:var(–muted);font-family:‘Barlow’,sans-serif;font-size:11px;cursor:pointer;transition:all 0.2s;margin-top:4px}
.add-serie-btn:hover{border-color:var(–green);color:var(–green)}
.save-series-btn{width:100%;padding:9px;background:var(–green);color:#0a0a0a;border:none;border-radius:8px;font-family:‘Barlow’,sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:opacity 0.2s;margin-top:8px}
.save-series-btn:hover{opacity:0.85}
.save-series-btn.her{background:var(–her)}
.series-history{margin-top:10px}
.series-history-title{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(–muted);margin-bottom:6px}
.sh-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(–border);font-size:12px}
.sh-row:last-child{border-bottom:none}
.sh-label{color:var(–muted)}
.sh-val{font-family:‘Barlow Condensed’,sans-serif;font-size:16px;font-weight:700;color:var(–him)}
.sh-val.her{color:var(–her)}

/* AMRAP */
.amrap-block{margin-top:10px;background:var(–s2);border-radius:12px;padding:12px;border:1px solid var(–border)}
.amrap-title{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(–muted);margin-bottom:10px}
.amrap-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.amrap-row label{font-size:12px;color:var(–muted);flex:1}
.amrap-row input{width:56px;background:var(–border);border:none;border-radius:6px;padding:5px 8px;color:var(–text);font-family:‘Barlow Condensed’,sans-serif;font-size:20px;font-weight:700;text-align:center;outline:none}
.save-amrap-btn{padding:7px 12px;background:var(–him);color:#0a0a0a;border:none;border-radius:8px;font-family:‘Barlow’,sans-serif;font-size:11px;font-weight:600;cursor:pointer}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:#1a1a1a;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:500px;border:1px solid var(–border);border-bottom:none;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-family:‘Barlow Condensed’,sans-serif;font-size:20px;font-weight:800;text-transform:uppercase;margin-bottom:18px}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(–muted);margin-bottom:5px}
.modal-field input,.modal-field select{width:100%;background:var(–s2);border:1px solid var(–border);border-radius:10px;padding:11px 13px;color:var(–text);font-family:‘Barlow’,sans-serif;font-size:14px;outline:none;transition:border-color 0.2s}
.modal-field input:focus,.modal-field select:focus{border-color:var(–him)}
.modal-field select option{background:var(–s2)}
.modal-btns{display:flex;gap:8px;margin-top:18px}
.modal-save{flex:1;padding:13px;background:var(–him);color:#0a0a0a;border:none;border-radius:12px;font-family:‘Barlow’,sans-serif;font-size:14px;font-weight:600;cursor:pointer}
.modal-cancel{padding:13px 18px;background:var(–s2);color:var(–muted);border:1px solid var(–border);border-radius:12px;font-family:‘Barlow’,sans-serif;font-size:14px;cursor:pointer}

/* WEEK NAME EDITOR */
.week-name-edit{display:flex;gap:8px;align-items:center;padding:0 16px 12px}
.week-name-input{flex:1;background:var(–s2);border:1px solid var(–border);border-radius:10px;padding:8px 12px;color:var(–text);font-family:‘Barlow’,sans-serif;font-size:13px;outline:none}
.week-name-input:focus{border-color:var(–him)}
.week-name-save{padding:8px 14px;background:var(–him);color:#0a0a0a;border:none;border-radius:10px;font-family:‘Barlow’,sans-serif;font-size:12px;font-weight:600;cursor:pointer}

/* PROG */
.prog-section{margin:16px 16px 12px;padding:14px;background:var(–surface);border:1px solid var(–border);border-radius:14px}
.prog-lbl{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(–muted);margin-bottom:10px}
.prog-grid{display:grid;grid-template-columns:60px 1fr;gap:6px;font-size:12px}

.reset-btn{display:block;margin:0 16px;width:calc(100% - 32px);padding:12px;background:transparent;border:1px solid var(–border);border-radius:10px;color:var(–muted);font-family:‘Barlow’,sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s}
.reset-btn:hover{border-color:#555;color:var(–text)}

.empty-day{text-align:center;padding:40px 20px;color:var(–muted)}
.empty-day-icon{font-size:40px;margin-bottom:12px}
.empty-day-text{font-size:14px;margin-bottom:16px}
.empty-day-btn{padding:10px 20px;background:rgba(240,165,0,0.1);border:1px solid var(–him);border-radius:10px;color:var(–him);font-family:‘Barlow’,sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s}

.sync-indicator{position:fixed;top:16px;right:16px;background:var(–green);color:#0a0a0a;font-size:11px;font-weight:600;padding:4px 10px;border-radius:100px;opacity:0;transition:opacity 0.3s;z-index:999;pointer-events:none}
.sync-indicator.show{opacity:1}
</style>

</head>

  </div>
</div>

// ---- SUPABASE ----
async function sb(path, options={}) {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
      headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':'return=representation',...(options.headers||{})},
      ...options
    });
    if(!res.ok) return null;
    try{return await res.json();}catch{return null;}
  } catch{return null;}
}

function showSync() {
  const el = document.getElementById('syncIndicator');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2000);
}

// ---- INIT ----
async function init() {
  await loadWeeks();
  renderWeekSelector();
  renderDayStrip();
  if(currentWeek) await loadDay();
}

async function loadWeeks() {
  const data = await sb('semanas?order=numero.asc&select=*');
  if(data && data.length > 0) {
    weeks = data;
    currentWeek = weeks[0];
  } else {
    // Create first week
    const w = await sb('semanas', {method:'POST', body:JSON.stringify({numero:1, nombre:'Semana 1'})});
    if(w && w.length > 0) {
      weeks = [w[0]];
      currentWeek = w[0];
      await seedWeek(w[0].id);
    }
  }
}

async function seedWeek(semanaId) {
  for(const dayKey of Object.keys(DEFAULT_DATA)) {
    // Create dia
    const dayInfo = DAYS.find(d=>d.key===dayKey);
    const diaRes = await sb('dias', {method:'POST', body:JSON.stringify({semana_id:semanaId, dia:dayKey, titulo:dayInfo.title, subtitulo:dayInfo.sub})});
    if(!diaRes||!diaRes[0]) continue;
    const diaId = diaRes[0].id;

    for(let bi=0; bi<DEFAULT_DATA[dayKey].length; bi++) {
      const b = DEFAULT_DATA[dayKey][bi];
      const bRes = await sb('bloques', {method:'POST', body:JSON.stringify({dia_id:diaId, titulo:b.titulo, tipo:b.tipo, badge:b.badge, orden:bi})});
      if(!bRes||!bRes[0]) continue;
      const bId = bRes[0].id;

      for(let ei=0; ei<b.ejercicios.length; ei++) {
        const e = b.ejercicios[ei];
        await sb('ejercicios', {method:'POST', body:JSON.stringify({bloque_id:bId, player:e.player, nombre:e.nombre, detalle:e.detalle, orden:ei})});
      }
    }
  }
}

async function addWeek() {
  const num = weeks.length + 1;
  const nombre = `Semana ${num}`;
  const w = await sb('semanas', {method:'POST', body:JSON.stringify({numero:num, nombre})});
  if(w && w[0]) {
    weeks.push(w[0]);
    currentWeek = w[0];
    await seedWeek(w[0].id);
    renderWeekSelector();
    await loadDay();
  }
}

async function saveWeekName() {
  const name = document.getElementById('weekNameInput').value.trim();
  if(!name || !currentWeek) return;
  await sb(`semanas?id=eq.${currentWeek.id}`, {method:'PATCH', body:JSON.stringify({nombre:name})});
  currentWeek.nombre = name;
  weeks = weeks.map(w=>w.id===currentWeek.id ? {...w, nombre:name} : w);
  renderWeekSelector();
  showSync();
  document.getElementById('weekNameEdit').style.display = 'none';
}

// ---- LOAD DAY ----
async function loadDay() {
  const content = document.getElementById('mainContent');
  content.className = `content sv-${currentPlayer}`;
  content.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Cargando...</div>';

  if(!currentWeek) return;

  // Get dia
  const dias = await sb(`dias?semana_id=eq.${currentWeek.id}&dia=eq.${currentDay}&select=*`);
  if(!dias || dias.length === 0) {
    content.innerHTML = renderEmptyDay();
    return;
  }
  const dia = dias[0];

  // Get bloques
  const bloques = await sb(`bloques?dia_id=eq.${dia.id}&order=orden.asc&select=*`);
  if(!bloques || bloques.length === 0) {
    content.innerHTML = renderEmptyDay();
    return;
  }

  // Get all ejercicios for this day's blocks
  const bloqueIds = bloques.map(b=>b.id);
  const ejercicios = await sb(`ejercicios?bloque_id=in.(${bloqueIds.join(',')})&order=orden.asc&select=*`);

  // Render
  let html = renderDayHeader(dia);

  if(currentDay === 'jueves') {
    html += `<div class="warn">⚠️ Asier: hacelo con al menos 6 horas antes del futsal nocturno</div>`;
  }

  for(const bloque of bloques) {
    const exs = (ejercicios||[]).filter(e=>e.bloque_id===bloque.id);
    html += renderBlock(bloque, exs);
  }

  // Add block button
  html += `<button style="width:100%;padding:10px;background:transparent;border:1px dashed var(--border);border-radius:12px;color:var(--muted);font-family:'Barlow',sans-serif;font-size:12px;cursor:pointer;margin-bottom:12px" onclick="addBlock('${dia.id}')">+ Añadir bloque</button>`;

  content.innerHTML = html;
  updateProgress();
}

function renderDayHeader(dia) {
  const dayInfo = DAYS.find(d=>d.key===currentDay)||{icon:'📅',title:dia.titulo,sub:dia.subtitulo};
  return `<div class="day-header">
    <div class="day-header-icon">${dayInfo.icon}</div>
    <div style="flex:1">
      <div class="day-header-title">${dia.titulo||dayInfo.title}</div>
      <div class="day-header-sub">${dia.subtitulo||dayInfo.sub}</div>
    </div>
  </div>`;
}

function renderEmptyDay() {
  return `<div class="empty-day">
    <div class="empty-day-icon">📝</div>
    <div class="empty-day-text">Este día está vacío para esta semana</div>
    <button class="empty-day-btn" onclick="initDay()">+ Crear día desde plantilla</button>
  </div>`;
}

function getBadgeClass(tipo) {
  const map = {fuerza:'b-str',amrap:'b-amr',emom:'b-emo',tabata:'b-tab',calentamiento:'b-wrm',rec:'b-rec',tecnica:'b-str'};
  return map[tipo]||'b-str';
}
function getDotClass(tipo) {
  const map = {fuerza:'dot-a',amrap:'dot-b',emom:'dot-b',tabata:'dot-b',calentamiento:'dot-w',rec:'dot-r',tecnica:'dot-a'};
  return map[tipo]||'dot-a';
}

function renderBlock(bloque, ejercicios) {
  const badgeClass = getBadgeClass(bloque.tipo);
  const dotClass = getDotClass(bloque.tipo);
  const isOpen = bloque.tipo === 'fuerza' || bloque.tipo === 'calentamiento' || bloque.tipo === 'rec' || bloque.tipo === 'tecnica';
  const isFuerza = bloque.tipo === 'fuerza';
  const isAmrap = bloque.tipo === 'amrap';

  const himExs = ejercicios.filter(e=>e.player==='him'||e.player==='shared');
  const herExs = ejercicios.filter(e=>e.player==='her'||e.player==='shared');
  const sharedExs = ejercicios.filter(e=>e.player==='shared');
  const himOnlyExs = ejercicios.filter(e=>e.player==='him');
  const herOnlyExs = ejercicios.filter(e=>e.player==='her');

  let exHtml = '';

  if(sharedExs.length > 0) {
    exHtml += `<div class="shared">`;
    for(const ex of sharedExs) exHtml += renderEx(ex, isFuerza);
    exHtml += `<button class="add-ex-btn" onclick="openAddEx('${bloque.id}','shared')">+ Añadir ejercicio</button>`;
    exHtml += `</div>`;
  }

  if(himOnlyExs.length > 0 || sharedExs.length === 0) {
    exHtml += `<div class="him-only">`;
    if(himOnlyExs.length > 0) exHtml += `<div class="info info-him">👨 <strong>Asier</strong></div>`;
    for(const ex of himOnlyExs) exHtml += renderEx(ex, isFuerza);
    exHtml += `<button class="add-ex-btn" onclick="openAddEx('${bloque.id}','him')">+ Añadir ejercicio</button>`;
    exHtml += `</div>`;
  }

  if(herOnlyExs.length > 0 || sharedExs.length === 0) {
    exHtml += `<div class="her-only">`;
    if(herOnlyExs.length > 0) exHtml += `<div class="info info-her">👩 <strong>Ella</strong></div>`;
    for(const ex of herOnlyExs) exHtml += renderEx(ex, isFuerza);
    exHtml += `<button class="add-ex-btn" onclick="openAddEx('${bloque.id}','her')">+ Añadir ejercicio</button>`;
    exHtml += `</div>`;
  }

  if(isAmrap) {
    exHtml += renderAmrap(bloque.id);
  }

  return `<div class="block ${isOpen?'open':''}" id="block-${bloque.id}">
    <div class="block-hd" onclick="tb(this)">
      <div class="bdot ${dotClass}"></div>
      <div class="btitle">${bloque.titulo}</div>
      <span class="bbadge ${badgeClass}">${bloque.badge}</span>
      <button class="edit-toggle" onclick="toggleEdit(event,this,'${bloque.id}')">✏️ Editar</button>
      <span class="chev">▾</span>
    </div>
    <div class="block-body">${exHtml}</div>
  </div>`;
}

function renderEx(ex, showLog=false) {
  const logBtn = showLog ? `<button class="ex-log-btn" onclick="openSeriesLog(event,'${ex.id}','${ex.nombre.replace(/'/g,"\\'")}')">📊</button>` : '';
  return `<div class="ex-row" id="ex-${ex.id}" onclick="toggleDone(this)">
    <div class="ex-chk"></div>
    <div class="ex-content">
      <div class="ex-name-text">${ex.nombre}</div>
      ${ex.detalle?`<div class="ex-det-text">${ex.detalle}</div>`:''}
    </div>
    ${logBtn}
    <div class="ex-actions">
      <button class="ex-edit-btn" onclick="openEditEx(event,'${ex.id}','${ex.nombre.replace(/'/g,"\\'")}','${(ex.detalle||'').replace(/'/g,"\\'")}')">✏️</button>
      <button class="ex-del-btn" onclick="deleteEx(event,'${ex.id}')">✕</button>
    </div>
  </div>`;
}

function renderAmrap(bloqueId) {

// ---- SERIES LOG ----
async function openSeriesLog(e, exId, exNombre) {
  e.stopPropagation();
  modalMode = 'series';
  modalTarget = exId;
  document.getElementById('modalTitle').textContent = exNombre;
  document.getElementById('modalPlayerField').style.display = 'none';

  // Load existing series for this week
  const semNum = currentWeek ? currentWeek.numero : 1;
  const existing = await sb(`series_log?ejercicio_id=eq.${exId}&player=eq.${currentPlayer}&semana_num=eq.${semNum}&order=numero_serie.asc&select=*`);

  const series = (existing && existing.length > 0) ? existing : [{numero_serie:1,kg:0,reps:0},{numero_serie:2,kg:0,reps:0},{numero_serie:3,kg:0,reps:0}];

  let seriesHtml = `<div class="series-panel">
    <div class="series-panel-title">
      <span>Series · ${currentPlayer==='him'?'Asier':'Ella'} · Sem ${semNum}</span>
    </div>`;

  for(const s of series) {
    seriesHtml += `<div class="series-row">
      <div class="series-num">${s.numero_serie}</div>
      <input type="number" class="series-input ${currentPlayer==='her'?'her-focus':''}" placeholder="kg" value="${s.kg||''}" data-serie="${s.numero_serie}" data-field="kg" step="0.5" min="0">
      <span class="series-unit">kg</span>
      <input type="number" class="series-input ${currentPlayer==='her'?'her-focus':''}" placeholder="reps" value="${s.reps||''}" data-serie="${s.numero_serie}" data-field="reps" min="0">
      <span class="series-unit">reps</span>
    </div>`;
  }

  seriesHtml += `<button class="add-serie-btn" onclick="addSerieRow(this)">+ Serie</button>`;
  seriesHtml += `<button class="save-series-btn ${currentPlayer==='her'?'her':''}" onclick="saveSeries('${exId}',${semNum})">💾 Guardar series</button>`;

  // History
  const allHistory = await sb(`series_log?ejercicio_id=eq.${exId}&player=eq.${currentPlayer}&order=semana_num.desc,numero_serie.asc&select=*`);
  if(allHistory && allHistory.length > 0) {
    const bySem = {};
    for(const r of allHistory) {
      if(!bySem[r.semana_num]) bySem[r.semana_num]=[];
      bySem[r.semana_num].push(r);
    }
    seriesHtml += `<div class="series-history"><div class="series-history-title">Historial</div>`;
    for(const [sem, rows] of Object.entries(bySem).sort((a,b)=>b[0]-a[0]).slice(0,4)) {
      const maxKg = Math.max(...rows.map(r=>r.kg||0));
      const totalReps = rows.reduce((s,r)=>s+(r.reps||0),0);
      seriesHtml += `<div class="sh-row">
        <span class="sh-label">Sem ${sem} · ${rows.length} series</span>
        <span class="sh-val ${currentPlayer==='her'?'her':''}">${maxKg}kg max · ${totalReps} reps</span>
      </div>`;
    }
    seriesHtml += `</div>`;
  }

  seriesHtml += `</div>`;

  document.getElementById('modalName').parentElement.style.display = 'none';
  document.getElementById('modalDet').parentElement.style.display = 'none';
  document.getElementById('modalSaveBtn').style.display = 'none';

  // Inject into modal
  const modal = document.querySelector('.modal');
  let seriesContainer = modal.querySelector('.series-container');
  if(!seriesContainer) {
    seriesContainer = document.createElement('div');
    seriesContainer.className = 'series-container';
    modal.insertBefore(seriesContainer, modal.querySelector('.modal-btns'));
  }
  seriesContainer.innerHTML = seriesHtml;

  openModal();
}

function addSerieRow(btn) {
  const panel = btn.closest('.series-panel');
  const rows = panel.querySelectorAll('.series-row');
  const nextNum = rows.length + 1;
  const row = document.createElement('div');
  row.className = 'series-row';
  row.innerHTML = `<div class="series-num">${nextNum}</div>
    <input type="number" class="series-input ${currentPlayer==='her'?'her-focus':''}" placeholder="kg" data-serie="${nextNum}" data-field="kg" step="0.5" min="0">
    <span class="series-unit">kg</span>
    <input type="number" class="series-input ${currentPlayer==='her'?'her-focus':''}" placeholder="reps" data-serie="${nextNum}" data-field="reps" min="0">
    <span class="series-unit">reps</span>`;
  btn.parentElement.insertBefore(row, btn);
}

async function saveSeries(exId, semNum) {
  const panel = document.querySelector('.series-panel');
  const rows = panel.querySelectorAll('.series-row');
  const saveBtn = panel.querySelector('.save-series-btn');
  saveBtn.textContent = '...';

  // Delete existing for this week
  await sb(`series_log?ejercicio_id=eq.${exId}&player=eq.${currentPlayer}&semana_num=eq.${semNum}`, {method:'DELETE'});

  for(const row of rows) {
    const serie = row.querySelector('[data-field="kg"]').dataset.serie;
    const kg = parseFloat(row.querySelector('[data-field="kg"]').value)||0;
    const reps = parseInt(row.querySelector('[data-field="reps"]').value)||0;
    if(kg > 0 || reps > 0) {
      await sb('series_log', {method:'POST', body:JSON.stringify({ejercicio_id:exId, player:currentPlayer, semana_num:semNum, numero_serie:parseInt(serie), kg, reps})});
    }
  }

  saveBtn.textContent = '✓ Guardado';
  showSync();
  setTimeout(()=>closeModal(), 800);
}

// ---- AMRAP ----
async function saveAmrap(bloqueId) {
  const input = document.getElementById(`amrap-${bloqueId}`);
  const val = parseInt(input.value);
  if(isNaN(val)||val<0) return;
  const week = `Sem ${currentWeek?currentWeek.numero:1} · ${new Date().getFullYear()}`;
  const existing = await sb(`amrap_history?player=eq.${currentPlayer}&day=eq.${currentDay}&week_label=eq.${encodeURIComponent(week)}&select=id`);
  if(existing && existing.length>0) {
    await sb(`amrap_history?id=eq.${existing[0].id}`, {method:'PATCH', body:JSON.stringify({score:val})});
  } else {
    await sb('amrap_history', {method:'POST', body:JSON.stringify({player:currentPlayer, day:currentDay, week_label:week, score:val})});
  }
  input.value='';
  showSync();
  loadAmrapHistory(bloqueId);
}

async function loadAmrapHistory(bloqueId) {
  const el = document.getElementById(`amrap-hist-${bloqueId}`);
  if(!el) return;
  const data = await sb(`amrap_history?player=eq.${currentPlayer}&day=eq.${currentDay}&order=created_at.desc&limit=6&select=week_label,score`);
  if(!data||data.length===0){el.innerHTML='<div style="font-size:12px;color:var(--muted)">Aún no hay registros</div>';return;}
  const best = Math.max(...data.map(h=>h.score));
  el.innerHTML = data.map((h,i)=>{
    const trend = i<data.length-1?(h.score>data[i+1].score?'↑':h.score<data[i+1].score?'↓':'→'):'';
    return `<div class="sh-row"><span class="sh-label">${h.week_label} ${trend}</span><span class="sh-val ${currentPlayer==='her'?'her':''}">${h.score} rondas ${h.score===best?'🏆':''}</span></div>`;
  }).join('');
}

// ---- EDIT / ADD EXERCISES ----
function openAddEx(bloqueId, player) {
  modalMode = 'add';
  modalBloqueId = bloqueId;
  document.getElementById('modalTitle').textContent = 'Añadir ejercicio';
  document.getElementById('modalName').value='';
  document.getElementById('modalDet').value='';
  document.getElementById('modalPlayer').value = player;
  showModalFields();
  document.getElementById('modalSaveBtn').onclick = saveAddEx;
  openModal();
}

async function saveAddEx() {
  const nombre = document.getElementById('modalName').value.trim();
  const detalle = document.getElementById('modalDet').value.trim();
  const player = document.getElementById('modalPlayer').value;
  if(!nombre) return;

  // Get current max orden
  const exs = await sb(`ejercicios?bloque_id=eq.${modalBloqueId}&select=orden&order=orden.desc&limit=1`);
  const orden = (exs && exs[0]) ? exs[0].orden + 1 : 0;

  await sb('ejercicios', {method:'POST', body:JSON.stringify({bloque_id:modalBloqueId, player, nombre, detalle, orden})});
  closeModal();
  showSync();
  await loadDay();
}

function openEditEx(e, exId, nombre, detalle) {
  e.stopPropagation();
  modalMode = 'edit';
  modalTarget = exId;
  document.getElementById('modalTitle').textContent = 'Editar ejercicio';
  document.getElementById('modalName').value = nombre;
  document.getElementById('modalDet').value = detalle;
  document.getElementById('modalPlayerField').style.display = 'none';
  showModalFields();
  document.getElementById('modalSaveBtn').onclick = saveEditEx;
  openModal();
}

async function saveEditEx() {
  const nombre = document.getElementById('modalName').value.trim();
  const detalle = document.getElementById('modalDet').value.trim();
  if(!nombre) return;
  await sb(`ejercicios?id=eq.${modalTarget}`, {method:'PATCH', body:JSON.stringify({nombre, detalle})});
  closeModal();
  showSync();
  await loadDay();
}

async function deleteEx(e, exId) {
  e.stopPropagation();
  await sb(`ejercicios?id=eq.${exId}`, {method:'DELETE'});
  showSync();
  await loadDay();
}

async function addBlock(diaId) {
  const titulo = prompt('Nombre del bloque:');
  if(!titulo) return;
  await sb('bloques', {method:'POST', body:JSON.stringify({dia_id:diaId, titulo, tipo:'fuerza', badge:'', orden:99})});
  showSync();
  await loadDay();
}

async function initDay() {
  if(!currentWeek) return;
  // Create dia from default
  const dayInfo = DAYS.find(d=>d.key===currentDay);
  const diaRes = await sb('dias', {method:'POST', body:JSON.stringify({semana_id:currentWeek.id, dia:currentDay, titulo:dayInfo.title, subtitulo:dayInfo.sub})});
  if(!diaRes||!diaRes[0]) return;
  const diaId = diaRes[0].id;
  const defaultBlocks = DEFAULT_DATA[currentDay]||[];
  for(let bi=0;bi<defaultBlocks.length;bi++){
    const b = defaultBlocks[bi];
    const bRes = await sb('bloques', {method:'POST', body:JSON.stringify({dia_id:diaId, titulo:b.titulo, tipo:b.tipo, badge:b.badge, orden:bi})});
    if(!bRes||!bRes[0]) continue;
    for(let ei=0;ei<b.ejercicios.length;ei++){
      const ex=b.ejercicios[ei];
      await sb('ejercicios',{method:'POST',body:JSON.stringify({bloque_id:bRes[0].id,player:ex.player,nombre:ex.nombre,detalle:ex.detalle,orden:ei})});
    }
  }
  await loadDay();
}

// ---- UI ----
function setPlayer(player, tab) {
  currentPlayer = player;
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('mainContent').className = `content sv-${player}`;
  document.getElementById('pFill').classList.toggle('her', player==='her');
  document.getElementById('pName').textContent = player==='him'?'Asier':'Ella';
  updateProgress();
  // Reload amrap histories
  document.querySelectorAll('[id^="amrap-hist-"]').forEach(el=>{
    const bloqueId = el.id.replace('amrap-hist-','');
    loadAmrapHistory(bloqueId);
  });
}

function renderWeekSelector() {
  const el = document.getElementById('weekSelector');
  el.innerHTML = weeks.map(w=>`<button class="week-btn ${currentWeek&&w.id===currentWeek.id?'active':''}" onclick="selectWeek('${w.id}',this)">${w.nombre}</button>`).join('');
  el.innerHTML += `<button class="add-week-btn" onclick="addWeek()">+ Sem ${weeks.length+1}</button>`;
  // Show name editor for current week
  if(currentWeek) {
    document.getElementById('weekNameInput').value = currentWeek.nombre;
  }
}

async function selectWeek(id, btn) {
  currentWeek = weeks.find(w=>w.id===id);
  document.querySelectorAll('.week-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('weekNameInput').value = currentWeek.nombre;
  document.getElementById('weekNameEdit').style.display = 'flex';
  await loadDay();
}

function renderDayStrip() {
  document.getElementById('dayStrip').innerHTML = DAYS.map(d=>
    `<button class="day-btn ${d.key===currentDay?'active':''}" onclick="selectDay('${d.key}',this)">${d.label}</button>`
  ).join('');
}

async function selectDay(day, btn) {
  currentDay = day;
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  await loadDay();
}

function tb(hd) { hd.parentElement.classList.toggle('open'); }

function toggleEdit(e, btn, bloqueId) {
  e.stopPropagation();
  const block = document.getElementById(`block-${bloqueId}`);
  block.classList.toggle('edit-active');
  btn.classList.toggle('on');
  btn.textContent = block.classList.contains('edit-active') ? '✓ Listo' : '✏️ Editar';
  const isActive = block.classList.contains('edit-active');
  block.querySelectorAll('.ex-actions').forEach(a=>a.style.display=isActive?'flex':'');
  block.querySelectorAll('.add-ex-btn').forEach(b=>b.style.display=isActive?'block':'');
}

function toggleDone(row) {
  if(row.tagName==='BUTTON') return;
  row.classList.toggle('done');
  row.querySelector('.ex-chk').textContent = row.classList.contains('done')?'✓':'';
  updateProgress();
}

function updateProgress() {
  const content = document.getElementById('mainContent');
  const player = currentPlayer;
  const sharedRows = [...content.querySelectorAll('.shared .ex-row')];
  const playerRows = [...content.querySelectorAll(`.${player}-only .ex-row`)];
  const all = sharedRows.length + playerRows.length;
  const done = [...sharedRows,...playerRows].filter(r=>r.classList.contains('done')).length;
  document.getElementById('pText').textContent = `${done} / ${all}`;
  document.getElementById('pFill').style.width = all>0?(done/all*100)+'%':'0%';
}

function resetDay() {
  document.querySelectorAll('#mainContent .ex-row').forEach(r=>{
    r.classList.remove('done');
    r.querySelector('.ex-chk').textContent='';
  });
  updateProgress();
}

// ---- MODAL ----
function showModalFields() {
  document.getElementById('modalName').parentElement.style.display='block';
  document.getElementById('modalDet').parentElement.style.display='block';
  document.getElementById('modalPlayerField').style.display='block';
  document.getElementById('modalSaveBtn').style.display='block';
  const sc = document.querySelector('.series-container');
  if(sc) sc.innerHTML='';
}

function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  showModalFields();
  modalTarget=null;
}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ---- START ----
init();
</script>
